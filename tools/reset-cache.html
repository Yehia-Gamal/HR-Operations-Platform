<!doctype html>
<html lang="ar" dir="rtl">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>مسح كاش النظام</title><style>body{margin:0;background:#070f1e;color:#eef5ff;font-family:Tahoma,Arial,sans-serif;display:grid;place-items:center;min-height:100vh}main{max-width:620px;padding:28px;border:1px solid #263550;border-radius:22px;background:#0d1729;text-align:center}button{background:#38c7f4;border:0;border-radius:14px;padding:12px 20px;font-weight:900;cursor:pointer}</style></head>
<body><main><h1>مسح كاش نظام الحضور</h1><p>استخدم هذه الصفحة إذا ظهرت رسالة أن Supabase غير مفعّل رغم ضبط الإعدادات.</p><button id="clear">مسح الكاش وإعادة فتح النظام</button><pre id="out"></pre></main><script>document.getElementById('clear').onclick=async()=>{const out=document.getElementById('out');try{if('serviceWorker'in navigator){const regs=await navigator.serviceWorker.getRegistrations();await Promise.all(regs.map(r=>r.unregister()));out.textContent+='تم حذف Service Workers\n'}if('caches'in window){const keys=await caches.keys();await Promise.all(keys.map(k=>caches.delete(k)));out.textContent+='تم حذف Caches\n'}localStorage.removeItem('hr.supabase.offlineQueue');localStorage.removeItem('hr.supabase.offlineQueue.safe');setTimeout(()=>location.href='../index.html?v=fresh-'+Date.now(),700)}catch(e){out.textContent=e.message}}</script></body></html>
