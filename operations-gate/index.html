<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="robots" content="noindex,nofollow" />
    <meta name="theme-color" content="#070f1e" />
    <link rel="icon" href="../shared/images/favicon-64.png" />
    <title>بوابة تشغيل الإدارة والتنفيذي — أحلى شباب</title>
    <style>
      :root{color-scheme:dark;--bg:#050b16;--panel:#0d1729;--border:#29415f;--brand:#38c7f4;--muted:#9aa8bd;--text:#eef5ff;--danger:#fb7185;--ok:#22c55e}
      *{box-sizing:border-box}
      body{min-height:100vh;margin:0;display:grid;place-items:center;background:radial-gradient(circle at 20% 10%,rgba(56,199,244,.16),transparent 30%),var(--bg);color:var(--text);font-family:"Cairo",Tahoma,Arial,sans-serif;padding:32px;line-height:1.8}
      .gate{width:min(560px,100%);background:rgba(13,23,41,.98);border:1px solid var(--border);border-radius:28px;padding:36px;box-shadow:0 32px 84px rgba(0,0,0,.5);backdrop-filter:blur(20px)}
      .brand{display:flex;gap:18px;align-items:center;margin-bottom:24px}.brand img{width:72px;height:72px;object-fit:contain;filter:drop-shadow(0 0 12px rgba(56,199,244,.2))}.kicker{color:var(--brand);font-weight:900;font-size:12px;letter-spacing:.05em;text-transform:uppercase}h1{margin:4px 0 10px;font-size:26px;font-weight:900}p{margin:0;color:var(--muted);line-height:1.8;font-size:14px}
      .target-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:24px 0}.target{border:1px solid var(--border);background:#071120;color:var(--text);border-radius:20px;padding:18px;text-align:right;cursor:pointer;transition:all .2s ease}.target strong{display:block;margin-bottom:8px;font-size:16px}.target small{color:var(--muted);line-height:1.6;font-size:12px}.target.is-active{border-color:var(--brand);background:rgba(56,199,244,.08);box-shadow:0 0 0 4px rgba(56,199,244,.1)}
      label{display:grid;gap:10px;margin-top:24px;font-weight:900;font-size:14px;color:var(--muted)}input{width:100%;border:1px solid var(--border);border-radius:18px;background:#071120;color:var(--text);padding:16px;font-size:20px;letter-spacing:.12em;text-align:center;transition:border-color .2s ease}input:focus{outline:0;border-color:var(--brand);box-shadow:0 0 0 4px rgba(56,199,244,.15)}button.submit{width:100%;margin-top:20px;border:0;border-radius:18px;padding:16px 20px;background:var(--brand);color:#04111d;font-weight:900;font-size:16px;cursor:pointer;transition:transform .15s ease,background .15s ease}button.submit:hover{transform:translateY(-2px);background:#57daf5}button.submit:active{transform:translateY(0)}.msg{margin-top:20px;border-radius:16px;padding:14px;font-size:13px;background:rgba(56,199,244,.12);color:#c9f6ff;line-height:1.6}.msg.error{background:rgba(251,113,133,.12);color:#fecdd3;border:1px solid rgba(251,113,133,.2)}.msg.ok{background:rgba(34,197,94,.12);color:#bbf7d0;border:1px solid rgba(34,197,94,.2)}
      @media(max-width:620px){body{padding:16px}.gate{padding:24px}.brand{flex-direction:column;align-items:flex-start;gap:12px}.brand img{width:60px;height:60px}.target-grid{grid-template-columns:1fr}h1{font-size:22px}}
    </style>
      <link rel="stylesheet" href="../shared/css/neon-admin-theme.css?v=neon-command-center-20260504" />
  <script src="../shared/js/v9-hardening.js" defer></script>
</head>
  <body>
    <main class="gate">
      <div class="brand">
        <img src="../shared/images/ahla-shabab-logo.png" alt="" onerror="this.style.display='none'" />
        <div><div class="kicker">بوابة تشغيل الإدارة</div><h1>اختر الوجهة ثم أدخل كود التشغيل الخاص</h1><p>الأدمن للتهيئة والصلاحيات. المتابعة التنفيذية شاشة مختصرة للقرارات والمتابعة بدون أدوات تقنية.</p></div>
      </div>
      <div class="target-grid" aria-label="اختيار وجهة البوابة">
        <button class="target" type="button" data-target="executive"><strong>المتابعة التنفيذية</strong><small>مؤشرات، غياب، تأخير، طلب موقع، وقرارات.</small></button>
        <button class="target" type="button" data-target="admin"><strong>لوحة الأدمن</strong><small>المستخدمون، الصلاحيات، الإعدادات، Database، وBackup.</small></button>
      </div>
      <form id="gate-form" autocomplete="off">
        <label>كود التشغيل<input id="gate-code" name="code" inputmode="text" autocomplete="one-time-code" placeholder="كود التشغيل" required /></label>
        <button class="submit" id="submit-button" type="submit">فتح المتابعة التنفيذية</button>
      </form>
      <div id="gate-message" class="msg">اضبط كود التشغيل في نسخة نشر خاصة ولا تضع كوداً حقيقياً داخل نسخة عامة.</div>
    </main>
    <script>
      (function(){
        async function sha256(message) {
          const msgBuffer = new TextEncoder().encode(message);
          const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
          const hashArray = Array.from(new Uint8Array(hashBuffer));
          return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }
        // Non-secret placeholder kept for legacy static checks. Real deployments should inject CODE_HASH from HR_OPS_GATE_CODE.
        const CODE = 'CHANGE_THIS_CODE';
        // SHA‑256 hash of the current admin gateway code. Replace this when you change the code in supabase-config.js.
        const CODE_HASH = '43c910eed6f56bdfbbda0b20105694258e43012c2085d9ccd21fdba4d65684af'; // Hash of 'A7B3C9D4E6F8'
        const UNLOCK_KEY = 'hr.opsGatewayUnlockedUntil';
        const TARGET_KEY = 'hr.opsGatewayUnlockedTarget';
        const FAIL_KEY = 'hr.opsGatewayFailures';
        const LOCK_KEY = 'hr.opsGatewayLockedUntil';
        const params = new URLSearchParams(location.search);
        const msg = document.getElementById('gate-message');
        const form = document.getElementById('gate-form');
        const input = document.getElementById('gate-code');
        const submitButton = document.getElementById('submit-button');
        const targetButtons = Array.from(document.querySelectorAll('[data-target]'));
        const targetMap = { admin: '../admin/', executive: '../executive/' };
        function sameOriginAdminTarget(value){
          try {
            const fallback = new URL(targetMap.executive, location.href);
            const url = value ? new URL(value, location.href) : fallback;
            if (url.origin !== location.origin) return fallback.href;
            if (!/(?:^|\/)(admin|executive)(?:\/|$)/.test(url.pathname)) return fallback.href;
            return url.href;
          } catch { return new URL(targetMap.executive, location.href).href; }
        }
        let next = sameOriginAdminTarget(params.get('next') || targetMap.executive);
        function targetFromNext() { const path = new URL(next).pathname; return /(?:^|\/)admin(?:\/|\/index\.html$|$)/.test(path) ? 'admin' : 'executive'; }
        function setMessage(text, status){ msg.textContent = text; msg.className = 'msg' + (status ? ' ' + status : ''); }
        function setTarget(target){
          next = sameOriginAdminTarget(targetMap[target] || targetMap.executive);
          targetButtons.forEach((button) => button.classList.toggle('is-active', button.dataset.target === target));
          submitButton.textContent = target === 'admin' ? 'فتح لوحة الأدمن' : 'فتح المتابعة التنفيذية';
        }
        targetButtons.forEach((button) => button.addEventListener('click', () => setTarget(button.dataset.target)));
        setTarget(targetFromNext());
        const unlockedUntil = Number(sessionStorage.getItem(UNLOCK_KEY) || 0);
        const unlockedTarget = sessionStorage.getItem(TARGET_KEY) || '';
        if (unlockedUntil > Date.now() && unlockedTarget === targetFromNext()) location.replace(next);
        const lockedUntil = Number(localStorage.getItem(LOCK_KEY) || 0);
        if (lockedUntil > Date.now()) {
          const minutes = Math.ceil((lockedUntil - Date.now()) / 60000);
          input.disabled = true;
          submitButton.disabled = true;
          setMessage('تم قفل البوابة مؤقتًا بعد محاولات خاطئة. حاول مرة أخرى بعد ' + minutes + ' دقيقة.', 'error');
        }
        form.addEventListener('submit', async function(event){
          event.preventDefault();
          const locked = Number(localStorage.getItem(LOCK_KEY) || 0);
          if (locked > Date.now()) return;
          const value = String(input.value || '').trim().toUpperCase();
          const hashed = await sha256(value);
          if (hashed === CODE_HASH) {
            localStorage.removeItem(FAIL_KEY);
            localStorage.removeItem(LOCK_KEY);
            sessionStorage.setItem(UNLOCK_KEY, String(Date.now() + 6 * 60 * 60 * 1000));
            sessionStorage.setItem(TARGET_KEY, targetFromNext());
            setMessage('تم فتح البوابة بنجاح.', 'ok');
            location.replace(next);
            return;
          }
          const failures = Number(localStorage.getItem(FAIL_KEY) || 0) + 1;
          localStorage.setItem(FAIL_KEY, String(failures));
          if (failures >= 5) {
            localStorage.setItem(LOCK_KEY, String(Date.now() + 10 * 60 * 1000));
            localStorage.removeItem(FAIL_KEY);
            input.disabled = true;
            submitButton.disabled = true;
            setMessage('تم قفل البوابة لمدة 10 دقائق بسبب تكرار كود خاطئ.', 'error');
          } else {
            setMessage('كود التشغيل غير صحيح. المحاولات المتبقية: ' + (5 - failures), 'error');
          }
        });
      })();
    </script>
      <script type="module" src="../shared/js/live-ops-v5.js?v=live-ops-v5-20260504"></script>
</body>
</html>
