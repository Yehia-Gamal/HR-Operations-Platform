      <script>
      (function guardOperationsGate(){
        try {
          var unlockedUntil = Number(sessionStorage.getItem('hr.opsGatewayUnlockedUntil') || 0);
          var unlockedTarget = sessionStorage.getItem('hr.opsGatewayUnlockedTarget') || '';
          if (unlockedUntil > Date.now() && unlockedTarget === 'admin') return;
          var next = location.pathname + location.search + location.hash;
          location.replace('../operations-gate/?next=' + encodeURIComponent(next));
        } catch (error) {
          location.replace('../operations-gate/');
        }
      })();
    </script>
