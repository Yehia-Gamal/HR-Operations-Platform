<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>معاينة Neon Command Center Theme</title>
  <link rel="stylesheet" href="../../shared/css/styles.css" />
  <link rel="stylesheet" href="../../shared/css/neon-admin-theme.css?v=neon-command-center-v3-20260504" />
</head>
<body class="theme-preview">
  <main style="max-width:1100px;margin:auto;padding:32px;display:grid;gap:22px">
    <header class="panel" style="padding:24px">
      <h1>معاينة الثيم — Neon Command Center</h1>
      <p>صفحة اختبار شكلية للبطاقات والأزرار وحالات المخاطر.</p>
    </header>
    <section class="dashboard-grid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px">
      <article class="metric-card risk-low" data-risk="low" style="padding:18px"><strong>حضور طبيعي</strong><p>Risk 12%</p></article>
      <article class="metric-card risk-medium" data-risk="medium" style="padding:18px"><strong>يحتاج متابعة</strong><p>Risk 54%</p></article>
      <article class="metric-card risk-high" data-risk="high" style="padding:18px"><strong>مراجعة عاجلة</strong><p>Risk 86%</p></article>
    </section>
    <section class="panel" style="padding:24px">
      <button class="button primary">زر أساسي</button>
      <button class="button danger">زر خطر</button>
      <input placeholder="حقل إدخال تجريبي" style="margin-top:16px;width:100%;padding:14px" />
    </section>
  </main>
</body>
</html>
