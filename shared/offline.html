<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>غير متصل — أحلى شباب HR</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0f172a;color:#e2e8f0;font-family:Tahoma,Arial,sans-serif;text-align:center;padding:24px} .card{max-width:420px;border:1px solid rgba(56,199,244,.25);border-radius:24px;background:#111c31;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,.35)} .icon{font-size:56px;margin-bottom:12px} h1{font-size:24px;margin:0 0 10px} p{color:#94a3b8;line-height:1.8} button{border:0;border-radius:14px;background:#38c7f4;color:#04111d;font-weight:800;padding:13px 22px;cursor:pointer}
  </style>
</head>
<body>
  <main class="card">
    <div class="icon">📡</div>
    <h1>لا يوجد اتصال بالإنترنت</h1>
    <p>تحقق من اتصالك وحاول مرة أخرى. البيانات المحفوظة محلياً ستظهر بعد عودة الاتصال.</p>
    <button onclick="location.reload()">إعادة المحاولة</button>
  </main>
</body>
</html>
